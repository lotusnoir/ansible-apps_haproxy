---
haproxy_backup_config: true

haproxy_config_global: |
    maxconn 2000
    daemon
    stats socket /tmp/haproxy.sock mode 600 level admin
haproxy_config_defaults: |
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    option dontlognull
    log global

haproxy_frontends:
  - name: main
    bind: "*:80"
    config: |
      default_backend dummy

haproxy_backends:
  - name: dummy
    config: |
      http-request return status 200 content-type text/plain string "HAProxy is running\n"

haproxy_listen:
  - name: stats
    config: |
      bind *:8404
      stats enable
      stats uri /stats
      stats refresh 10s
