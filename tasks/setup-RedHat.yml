---
- name: Add SCL
  ansible.builtin.dnf:
    name: centos-release-scl
    state: present
  when: haproxy_scl_package|default(False)

- name: Install haproxy SCL
  ansible.builtin.dnf:
    name: '{{ haproxy_scl_package }}'
    state: present

  when: haproxy_scl_package|default(False)

- name: Install haproxy packages
  ansible.builtin.dnf:
    name: '{{ haproxy_packages }}'
    state: present
